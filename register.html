<!DOCTYPE html>
<html>
<head>
<title>Register - Placement Preparation Guidance</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-box">
<h2>Create Account</h2>
<form onsubmit="return registerUser()">

</form>
</div>

<script src="js/script.js"></script>
</body>
</html>
